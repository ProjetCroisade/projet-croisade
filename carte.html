<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte du monde | Projet Croisade</title>
  <meta name="description" content="Carte du monde de l'univers de Projet Croisade.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link href="pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="pagefind/pagefind-ui.js"></script>
  <style>
    #map-container {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
      border: 2px solid #e7ba79;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      line-height: 0;
    }
    #map-container img {
      width: 100%;
      height: auto;
      display: block;
    }
    #map-container svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #map-loading {
      color: #aaa;
      padding: 60px;
      font-style: italic;
      line-height: normal;
    }

    /* Tooltip card */
    #map-tooltip {
      position: fixed;
      background: rgba(12, 8, 2, 0.96);
      border: 1px solid #e7ba79;
      border-radius: 6px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      width: min(290px, calc(100vw - 24px));
      box-shadow: 0 4px 24px rgba(0,0,0,0.75);
      overflow: hidden;
    }
    #map-tooltip .tip-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(231,186,121,0.25);
    }
    #map-tooltip .tip-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
    }
    #map-tooltip .tip-name {
      font-family: 'Uncial Antiqua', cursive;
      font-size: 0.92rem;
      color: #e7ba79;
      line-height: 1.2;
    }
    #map-tooltip .tip-desc {
      padding: 9px 14px 10px;
      font-size: 0.8rem;
      color: #bbb;
      line-height: 1.5;
    }
    #map-tooltip .tip-cta {
      padding: 5px 14px 7px;
      font-size: 0.75rem;
      color: #e7ba79;
      opacity: 0.65;
      border-top: 1px solid rgba(231,186,121,0.18);
      text-align: right;
    }

    /* Sur mobile : tooltip centré en bas de l'écran, taille fixe */
    @media (max-width: 600px) {
      #map-tooltip {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        top: auto !important;
        width: calc(100vw - 32px);
      }
      #map-tooltip .tip-desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div id="header"></div>
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header').innerHTML = html;
    const script = document.createElement('script');
    script.src = 'data/js/search.js';
    document.body.appendChild(script);
  });
</script>

<main style="text-align:center; padding: 60px 20px;">
  <h2 style="font-family:'Uncial Antiqua', cursive; color:#e7ba79; font-size:2rem; margin-bottom:0.3rem;">Carte du monde</h2>
  <p style="color:#aaa; font-style:italic; margin-bottom:0.4rem;">Carte incomplète — en construction</p>
  <p style="color:#aaa; font-style:italic; margin-bottom:2rem;">Survole une région pour la découvrir — clique pour en savoir plus.</p>
  <div id="map-container">
    <img src="images/carte incomplète.png" alt="Carte du monde">
    <div id="svg-overlay"></div>
  </div>
  <div id="map-tooltip">
    <div class="tip-header">
      <span class="tip-dot" id="tip-dot"></span>
      <span class="tip-name" id="tip-name"></span>
    </div>
    <div class="tip-desc" id="tip-desc"></div>
    <div class="tip-cta">Cliquer pour découvrir →</div>
  </div>
</main>

<footer>
  <p>&copy; Projet Croisade - Tous droits réservés</p>
</footer>

<script>
const REGIONS = {
  'path9': {
    label: 'Territoire des Nains',
    url: 'lore/nains.html',
    color: '#8B6525',
    desc: 'Maîtres forgerons renfermés dans leur grande forteresse de Vil Faldur, perchée dans les montagnes du nord. Leur forge légendaire est aujourd\'hui éteinte.'
  },
  'path10': {
    label: 'Territoire des Elfes',
    url: 'lore/elfes-monde.html',
    color: '#2D8A4E',
    desc: 'Peuple ancien bâti autour de l\'Arbre Monde, réparti entre les cités de Vyshad (capitale), Heilona et Jansalri. Créés par les dieux à l\'aube des temps.'
  },
  'g2': {
    label: 'Territoire des Drakeïdes',
    url: 'lore/drakeides.html',
    color: '#8B2222',
    desc: 'Descendants des anciens dragons ayant adopté une forme humanoïde. Réputés pour leur force colossale et leur inébranlable attrait pour les trésors.'
  },
  'path20': {
    label: 'Territoire des Hybrides',
    url: 'lore/hybrides.html',
    color: '#6B3A8B',
    desc: 'Peuple mi-humain mi-animal réuni à Löftina, autrefois carrefour diplomatique du continent. Frôlèrent l\'extinction avant d\'être sauvés par la famille Voldak.'
  },
  'path21': {
    label: 'Territoire des Orcs',
    url: 'lore/orcs.html',
    color: '#3D5A1A',
    desc: 'Tribus guerrières éparpillées dans des terres arides au sud-ouest. L\'honneur et les duels à mort régissent leur société, fragmentée par d\'incessantes guerres de territoire.'
  },
  'path22': {
    label: "Territoire des Aïshas",
    url: 'lore/aisha.html',
    color: '#B8860B',
    desc: 'Peuple mystérieux vivant à Atlante, cité d\'or érigée au cœur de la mer. Leur chant sacré, don de leur dieu marin, est redouté de tous les marins.'
  },
  'path23': {
    label: 'Territoire des Elfes des Ténèbres',
    url: 'lore/elfes-tenebres.html',
    color: '#3A3A9A',
    desc: 'Elfes ayant perdu la foi en l\'Arbre Monde après la trahison des dieux. Retirés dans une forêt plongée dans l\'obscurité, au nord des montagnes.'
  },
  'path24': {
    label: 'Territoire des Gobelins',
    url: 'lore/gobelins.html',
    color: '#4A6B2A',
    desc: 'Peuple tribal vivant dans de petits villages reliés par un réseau de galeries menant à Bolargyr, leur cité secrète souterraine. Souvent victimes d\'esclavage.'
  },
  'path25': {
    label: 'Territoire des Humains',
    url: 'lore/humains.html',
    color: '#7A3A1A',
    desc: 'Empire central fondé par Julius le Grand, jadis rayonnant depuis les grandes cités de Jularia et KoeurValloie. Repliés sur eux-mêmes depuis la fin des Voldak.'
  },
  'path26': {
    label: 'Territoire des Demi-Elfes',
    url: 'lore/demi-elfes.html',
    color: '#2A6B7A',
    desc: 'Race la plus jeune du continent, née de l\'union humaine-elfique. Rejetés des deux côtés depuis les exterminations, ils errent seuls à travers le monde.'
  }
};

const tooltip   = document.getElementById('map-tooltip');
const tipDot    = document.getElementById('tip-dot');
const tipName   = document.getElementById('tip-name');
const tipDesc   = document.getElementById('tip-desc');

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setFill(el, color) {
  if (el.tagName.toLowerCase() === 'g') {
    el.querySelectorAll('path').forEach(p => { p.style.fill = color; });
  } else {
    el.style.fill = color;
  }
}

function moveTip(e) {
  if (window.innerWidth <= 600) return; // handled by CSS on mobile
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  const x  = e.clientX;
  const y  = e.clientY;
  const margin = 14;
  const left = Math.min(x + margin, window.innerWidth  - tw - 8);
  const top  = Math.max(8,          Math.min(y - th - margin, window.innerHeight - th - 8));
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function initInteractivity(svgEl) {
  Object.entries(REGIONS).forEach(([id, data]) => {
    const el = svgEl.querySelector('#' + id);
    if (!el) return;

    // Transparent by default so the map PNG shows through
    setFill(el, 'transparent');
    el.style.cursor = 'pointer';

    el.addEventListener('mouseenter', e => {
      setFill(el, hexToRgba(data.color, 0.45));
      tipDot.style.background = data.color;
      tipName.textContent     = data.label;
      tipDesc.textContent     = data.desc;
      tooltip.style.display   = 'block';
      moveTip(e);
    });

    el.addEventListener('mousemove', moveTip);

    el.addEventListener('mouseleave', () => {
      setFill(el, 'transparent');
      tooltip.style.display = 'none';
    });

    el.addEventListener('click', () => {
      window.location.href = data.url;
    });
  });
}

fetch('images/carte incomplète.svg')
  .then(res => res.text())
  .then(svgText => {
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
    const svgEl  = svgDoc.querySelector('svg');

    // Remove the hidden Inkscape reference image (large base64 PNG)
    const refGroup = svgEl.querySelector('#g1');
    if (refGroup) refGroup.remove();
    const namedview = svgEl.querySelector('[id="namedview1"]');
    if (namedview) namedview.remove();

    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
    svgEl.setAttribute('preserveAspectRatio', 'none');

    document.getElementById('svg-overlay').appendChild(svgEl);
    initInteractivity(svgEl);
  });
</script>
</body>
</html>
