<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte du monde | Projet Croisade</title>
  <meta name="description" content="Carte du monde de l'univers de Projet Croisade.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="carte.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link href="pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="pagefind/pagefind-ui.js"></script>
</head>
<body>
<div id="header"></div>
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header').innerHTML = html;
    const script = document.createElement('script');
    script.src = 'data/js/search.js';
    document.body.appendChild(script);
  });
</script>

<main style="text-align:center; padding: 60px 20px;">
  <h2 style="font-family:'Uncial Antiqua', cursive; color:#e7ba79; font-size:2rem; margin-bottom:0.3rem;">Carte du monde</h2>
  <p style="color:#aaa; font-style:italic; margin-bottom:0.4rem;">Carte incomplète — en construction</p>
  <p style="color:#aaa; font-style:italic; margin-bottom:1.2rem;">Survole une région pour la découvrir — clique pour en savoir plus.</p>

  <div id="layer-controls">
    <button class="layer-btn" id="btn-map" data-layer="map">
      <span class="btn-dot" style="background:#8a7560;"></span>
      Carte
    </button>
    <button class="layer-btn" id="btn-colors" data-layer="colors">
      <span class="btn-dot" style="background: linear-gradient(135deg,#8B2222 50%,#2D8A4E 50%);"></span>
      Territoires
    </button>
  </div>

  <div id="map-container">
    <div id="map-inner">
      <img id="map-img" src="images/carte incomplète.png" alt="Carte du monde">
      <div id="svg-overlay"></div>
    </div>
    <div id="zoom-controls">
      <button id="zoom-reset">Réinitialiser</button>
      <div class="zoom-btns">
        <button class="zoom-btn" id="zoom-in"  title="Zoomer">+</button>
        <button class="zoom-btn" id="zoom-out" title="Dézoomer">−</button>
      </div>
    </div>
  </div>

  <div id="map-tooltip">
    <div class="tip-header">
      <span class="tip-dot" id="tip-dot"></span>
      <span class="tip-name" id="tip-name"></span>
    </div>
    <div class="tip-desc" id="tip-desc"></div>
    <div class="tip-cta">Cliquer pour découvrir →</div>
  </div>
</main>

<footer>
  <p>&copy; Projet Croisade - Tous droits réservés</p>
</footer>

<script src="data/js/carte.js"></script>
</body>
</html>
