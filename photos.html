<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos | Projet Croisade</title>
  <meta name="description" content="Galerie photos et albums des sessions passées de Projet Croisade.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link href="pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="pagefind/pagefind-ui.js"></script>
  <style>
    .albums-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 10px;
    }

    .album-card {
      flex: 1 1 260px;
      background: linear-gradient(180deg, #222, #161616);
      border: 1px solid #3a2e1a;
      border-top: 3px solid #e7ba79;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .album-card h3 {
      margin: 0;
      font-family: 'Uncial Antiqua', cursive;
      color: #e7ba79;
      font-size: 1.2rem;
    }

    .album-card .album-date {
      font-size: 0.85rem;
      color: #888;
      margin: 0;
    }

    .album-card .album-desc {
      font-size: 0.95rem;
      color: #c8bfa8;
      line-height: 1.7;
      margin: 0;
      flex: 1;
    }

    .album-card a.btn-album {
      display: inline-block;
      text-align: center;
      background-color: #e7ba79;
      color: #1a1000;
      font-weight: bold;
      text-decoration: none;
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 0.95rem;
      transition: background-color 0.2s ease, transform 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .album-card a.btn-album:hover {
      background-color: #f5d090;
      transform: translateY(-2px);
    }

    .album-card a.btn-album:active {
      transform: translateY(0);
    }

    .notice {
      background: rgba(231, 186, 121, 0.07);
      border: 1px dashed #5a4520;
      border-radius: 8px;
      padding: 16px 20px;
      color: #a89070;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
<div id="header"></div>
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header').innerHTML = html;

    const script = document.createElement('script');
    script.src = 'data/js/search.js';
    document.body.appendChild(script);
  });
</script>

<main>
  <h2>Photos des événements</h2>

  <p>Retrouvez ici les albums photo de chaque GN. Les albums sont hébergés sur Google Photos — cliquez sur un événement pour les consulter.</p>

  <div class="albums-grid">

    <!-- ============================================================
         Instructions pour Logann : 
         Copie un bloc .album-card ci-dessous, change le titre,
         la date, la description, et remplace le href par le lien
         de partage de l'album Google Photos.
         ============================================================ -->

    <!-- Exemple de carte — remplace le href par vrai lien Google Photos -->
    <div class="album-card">
      <h3>GN — Printemps 2026</h3>
      <p class="album-date">Mai 2026</p>
      <p class="album-desc">Photos du premier grand événement de la saison 2026.</p>
      <a class="btn-album" href="LIEN_GOOGLE_PHOTOS_ICI" target="_blank" rel="noopener">Voir l'album</a>
    </div>

    <!-- Ajoute les prochains albums ici -->

  </div>
</main>

<footer>
  <p>&copy; Projet Croisade - Tous droits réservés</p>
</footer>
<button onclick="scrollToTop()" id="btnTop" title="Retour en haut">⬆ Haut</button>
<script>
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
