<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable | Projet Croisade</title>
  <meta name="description" content="La page que vous cherchez n'existe pas.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <style>
    .error-code {
      font-family: 'Uncial Antiqua', cursive;
      font-size: 8rem;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(231, 186, 121, 0.4), 2px 4px 8px #000;
      margin: 0 0 0.1em;
      line-height: 1;
      letter-spacing: 0.05em;
    }
    .error-content {
      text-align: center;
      padding: 20px 0 10px;
    }
    .error-content p {
      color: var(--text-dim);
      font-style: italic;
      max-width: 480px;
      margin: 0 auto 1em;
    }
    .error-actions {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div id="header"></div>
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header').innerHTML = html;
    const script = document.createElement('script');
    script.src = 'data/js/search.js';
    document.body.appendChild(script);
  })
  .catch(function() {});
</script>

<main>
  <div class="content error-content">
    <p class="error-code">404</p>
    <h2>Page introuvable</h2>
    <hr>
    <p>Les brumes de l'Extermination ont englouti ce chemin.<br>La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <div class="error-actions">
      <a href="index.html" class="btn-metier">Retour à l'accueil</a>
    </div>
  </div>
</main>

<footer>
  <p>&copy; Projet Croisade - Tous droits réservés</p>
</footer>
</body>
</html>
